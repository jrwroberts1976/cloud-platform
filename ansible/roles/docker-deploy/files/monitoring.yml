services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    networks:
      - cloud-platform
    ports:
      - "9090:9090"


  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    networks:
      - cloud-platform
    ports:
      - "3000:3000"


  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    networks:
      - cloud-platform
    ports:
      - "9100:9100"


  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    networks:
      - cloud-platform
    ports:
      - "8080:8080"


networks:
  cloud-platform:
    external: true
