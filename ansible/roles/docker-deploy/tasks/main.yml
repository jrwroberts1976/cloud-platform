---
- name: Create cloud platform directory
  ansible.builtin.file:
    path: /opt/cloud-platform
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"


- name: Copy platform compose file
  ansible.builtin.copy:
    src: platform.yml
    dest: /opt/cloud-platform/platform.yml
    owner: ec2-user
    group: ec2-user
    mode: "0644"


- name: Create nginx configuration directory
  ansible.builtin.file:
    path: /opt/cloud-platform/nginx
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"
    

- name: Copy nginx reverse proxy configuration
  ansible.builtin.copy:
    src: nginx/cloud-platform.conf
    dest: /opt/cloud-platform/nginx/default.conf
    owner: ec2-user
    group: ec2-user
    mode: "0644"


- name: Create monitoring directory
  ansible.builtin.file:
    path: /opt/cloud-platform/monitoring
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Create Grafana data directory
  become: true
  ansible.builtin.file:
    path: /opt/cloud-platform/data/grafana
    state: directory
    owner: 472
    group: 472
    mode: "0755"

- name: Copy monitoring compose file
  ansible.builtin.copy:
    src: monitoring.yml
    dest: /opt/cloud-platform/monitoring/docker-compose.yml
    owner: ec2-user
    group: ec2-user
    mode: "0644"


- name: Create prometheus configuration directory
  ansible.builtin.file:
    path: /opt/cloud-platform/monitoring/prometheus
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"


- name: Copy prometheus configuration
  ansible.builtin.copy:
    src: prometheus/prometheus.yml
    dest: /opt/cloud-platform/monitoring/prometheus/prometheus.yml
    owner: ec2-user
    group: ec2-user
    mode: "0644"


- name: Create shared Docker network
  community.docker.docker_network:
    name: cloud-platform
    state: present


- name: Deploy platform stack
  community.docker.docker_compose_v2:
    project_src: /opt/cloud-platform
    files:
      - platform.yml
    state: present
    recreate: always


- name: Deploy monitoring stack
  community.docker.docker_compose_v2:
    project_src: /opt/cloud-platform/monitoring
    files:
      - docker-compose.yml
    state: present
    recreate: always
- name: Create dashboard data directory
  become: true
  ansible.builtin.file:
    path: /opt/cloud-platform/data/dashboards/dashy
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
  - dashy


- name: Create Dashy data directory
  become: true
  ansible.builtin.file:
    path: /opt/cloud-platform/data/dashboards/dashy
    state: directory
    owner: root
    group: root
    mode: "0755"
  tags:
    - dashy


- name: Deploy Dashy configuration
  become: true
  ansible.builtin.copy:
    src: dashy/conf.yml
    dest: /opt/cloud-platform/data/dashboards/dashy/conf.yml
    owner: root
    group: root
    mode: "0644"
  tags:
    - dashy
