---
- name: Create cloud platform directory
  ansible.builtin.file:
    path: /opt/cloud-platform
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Copy platform compose file
  ansible.builtin.copy:
    src: platform.yml
    dest: /opt/cloud-platform/platform.yml
    owner: ec2-user
    group: ec2-user
    mode: "0644"

- name: Copy monitoring compose file
  ansible.builtin.copy:
    src: monitoring.yml
    dest: /opt/cloud-platform/monitoring.yml
    owner: ec2-user
    group: ec2-user
    mode: "0644"

- name: Create Prometheus configuration directory
  ansible.builtin.file:
    path: /opt/cloud-platform/prometheus
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: "0755"

- name: Copy Prometheus configuration
  ansible.builtin.copy:
    src: prometheus.yml
    dest: /opt/cloud-platform/prometheus/prometheus.yml
    owner: ec2-user
    group: ec2-user
    mode: "0644"

- name: Create shared Docker network
  community.docker.docker_network:
    name: cloud-platform
    state: present

- name: Deploy platform stack
  community.docker.docker_compose_v2:
    project_src: /opt/cloud-platform
    files:
      - platform.yml
    state: present

- name: Deploy monitoring stack
  community.docker.docker_compose_v2:
    project_src: /opt/cloud-platform
    files:
      - monitoring.yml
    state: present
